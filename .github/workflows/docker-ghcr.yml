name: Build and Push Bundled Redis Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set lowercase owner
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          IMAGE="ghcr.io/${{ steps.lowercase.outputs.owner }}/sub2api-redis"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            {
              echo "image=${IMAGE}"
              echo "version=${VERSION}"
              echo "tags<<EOF"
              echo "${IMAGE}:${VERSION}"
              echo "${IMAGE}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            {
              echo "image=${IMAGE}"
              echo "version=edge-${SHORT_SHA}"
              echo "tags<<EOF"
              echo "${IMAGE}:edge"
              echo "${IMAGE}:sha-${SHORT_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.redis
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.run_started_at }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=Sub2API bundled Redis image
